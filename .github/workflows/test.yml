name: mvn Test

on: [workflow_call]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        java-version: ["21"]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"
          cache: "maven"

      - name: Copy env file
        run: cp .env.example .env

      - name: Generate TLS certificates for Traefik
        run: |
          mkdir -p config/traefik/certs
          openssl req -x509 -newkey rsa:2048 \
            -keyout config/traefik/certs/wallet-key.pem \
            -out config/traefik/certs/wallet-cert.pem \
            -days 1 -nodes -subj "/CN=localhost"

      - name: Up with docker compose
        run: podman compose up -d

      - name: Run tests
        env:
          MAVEN_CLI_OPTS: --batch-mode --no-transfer-progress --errors --fail-at-end -Dstyle.color=always -DinstallAtEnd=true -DdeployAtEnd=true
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # shellcheck disable=SC2086
          mvn $MAVEN_CLI_OPTS test

      - name: Down with docker compose
        run: podman compose down
