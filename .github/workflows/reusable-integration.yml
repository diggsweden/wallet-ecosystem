name: Reusable Ecosystem Integration

on:
  workflow_call:
    inputs:
      ecosystem-ref:
        required: false
        type: string
        default: ''
        description: "Git ref to checkout for wallet ecosystem (e.g., refs/pull/1/merge)"
      service-name:
        required: true
        type: string
        description: "Service name in docker-compose (e.g., wallet-client-gateway)"
      service-repo:
        required: true
        type: string
        description: "Full repository name of the service (e.g., diggsweden/wallet-client-gateway)"
      service-ref:
        required: true
        type: string
        description: "Git ref to checkout for the service (e.g., refs/pull/1/merge)"
      containerfile-path:
        required: false
        type: string
        default: "Containerfile"
        description: "Path to the Containerfile/Dockerfile relative to the service root"
      image-tag:
        required: false
        type: string
        default: "local"
        description: "Tag for the locally built image"

permissions:
  contents: read
  packages: read

jobs:
  integration-test:
    name: Integration Test (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Wallet Ecosystem
        uses: actions/checkout@v4
        with:
          repository: diggsweden/wallet-ecosystem
          ref: ${{ inputs.ecosystem-ref }}
          path: wallet-ecosystem

      - name: Checkout Service (${{ inputs.service-name }})
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.service-repo }}
          ref: ${{ inputs.service-ref }}
          path: ${{ inputs.service-name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose
          systemctl --user start podman.socket
          sudo sysctl -w net.ipv4.ip_unprivileged_port_start=80
          echo "PODMAN_SOCK=$XDG_RUNTIME_DIR/podman/podman.sock" >> "$GITHUB_ENV"

      - name: Build Service Image
        run: |
          cd ${{ inputs.service-name }}
          podman build -t ${{ inputs.service-name }}:${{ inputs.image-tag }} -f ${{ inputs.containerfile-path }} .

      - name: Prepare Ecosystem
        run: |
          cd wallet-ecosystem
          cp .env.example .env

          # Create transient override
          cat <<EOF > docker-compose.override.yaml
          services:
            ${{ inputs.service-name }}:
              image: ${{ inputs.service-name }}:${{ inputs.image-tag }}
          EOF

          # Generate TLS certificates
          mkdir -p config/traefik/certs
          openssl req -x509 -newkey rsa:2048 \
            -keyout config/traefik/certs/wallet-key.pem \
            -out config/traefik/certs/wallet-cert.pem \
            -days 1 -nodes -subj "/CN=localhost"

      - name: Start Ecosystem
        run: |
          cd wallet-ecosystem
          podman compose up -d

      - name: Wait for Services to be Healthy
        run: |
          cd wallet-ecosystem
          ./wait-until-healthy.sh

      - name: Run Ecosystem Integration Tests
        env:
          MAVEN_CLI_OPTS: --batch-mode --no-transfer-progress --errors --fail-at-end -Dstyle.color=always
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd wallet-ecosystem
          # shellcheck disable=SC2086
          mvn $MAVEN_CLI_OPTS test

      - name: Fetch Logs on Failure
        if: failure()
        run: |
          cd wallet-ecosystem
          podman compose logs > ecosystem-failure.log

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-logs-${{ inputs.service-name }}
          path: wallet-ecosystem/ecosystem-failure.log

      - name: Cleanup
        if: always()
        run: |
          if [ -d "wallet-ecosystem" ]; then
            cd wallet-ecosystem
            podman compose down
          fi
