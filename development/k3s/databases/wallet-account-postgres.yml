apiVersion: v1
kind: Secret
metadata:
  name: wallet-account-db
  namespace: wallet-ecosystem-local
type: Opaque
stringData:
  username: wallet-account
  password: pass
  database: wallet-account
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-account-db
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: wallet-account-db
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  selector:
    app.kubernetes.io/name: wallet-account-db
    app.kubernetes.io/part-of: wallet-ecosystem
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wallet-account-db
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: wallet-account-db
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  serviceName: wallet-account-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-account-db
      app.kubernetes.io/part-of: wallet-ecosystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-account-db
        app.kubernetes.io/part-of: wallet-ecosystem
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: wallet-account-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallet-account-db
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: wallet-account-db
                  key: database
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - wallet-account
                - -d
                - wallet-account
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
