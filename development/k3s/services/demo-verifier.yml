apiVersion: v1
kind: Service
metadata:
  name: demo-verifier
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: demo-verifier
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  selector:
    app.kubernetes.io/name: demo-verifier
    app.kubernetes.io/part-of: wallet-ecosystem
  ports:
    - name: http
      port: 3002
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-verifier
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: demo-verifier
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-verifier
      app.kubernetes.io/part-of: wallet-ecosystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-verifier
        app.kubernetes.io/part-of: wallet-ecosystem
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: demo-verifier
          image: ghcr.io/diggsweden/wallet-verifier-test-web:0.1.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3002
          env:
            - name: HOST_API
              value: http://refimpl-verifier-backend:8080/refimpl-verifier-backend
            - name: PORT
              value: "3002"
            - name: NITRO_PORT
              value: "3002"
            - name: NUXT_PUBLIC_BASE_URL
              value: http://localhost:28080/demo-verifier
            - name: NUXT_APP_BASE_URL
              value: /demo-verifier
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
