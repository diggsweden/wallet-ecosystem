apiVersion: v1
kind: Service
metadata:
  name: wallet-provider
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: wallet-provider
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  selector:
    app.kubernetes.io/name: wallet-provider
    app.kubernetes.io/part-of: wallet-ecosystem
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-provider
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: wallet-provider
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-provider
      app.kubernetes.io/part-of: wallet-ecosystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-provider
        app.kubernetes.io/part-of: wallet-ecosystem
      annotations:
        instrumentation.opentelemetry.io/inject-java: "true"
    spec:
      containers:
        - name: wallet-provider
          image: ghcr.io/diggsweden/wallet-provider:v0.0.18
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: /wallet-provider
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: TZ
              value: Europe/Stockholm
            - name: JAVA_OPTS
              value: -Djava.net.preferIPv4Stack=true
            - name: WUA_KEYSTORE_PATH
              value: file:///opt/common/wallet_provider.p12
            - name: WUA_KEYSTORE_PASSWORD
              value: pass1234
            - name: WUA_KEYSTORE_ALIAS
              value: wallet_provider
          readinessProbe:
            httpGet:
              path: /wallet-provider/actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /wallet-provider/actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: wallet-provider-certificate
              mountPath: /opt/common/wallet_provider.p12
              subPath: wallet_provider.p12
              readOnly: true
      volumes:
        - name: wallet-provider-certificate
          secret:
            secretName: wallet-provider-certificate
