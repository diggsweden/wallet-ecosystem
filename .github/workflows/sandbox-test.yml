# This is a basic workflow that is manually triggered

name: Sandbox Test workflow

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        java-version: ["25"]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"
          cache: "maven"

      - name: Run tests on sandbox
        env:
          MAVEN_CLI_OPTS: --batch-mode --no-transfer-progress --errors --fail-at-end -Dstyle.color=always -DinstallAtEnd=true -DdeployAtEnd=true
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGG_WALLET_ECOSYSTEM_VERIFIER_AUDIENCE: x509_san_dns:${{ secrets.SANDBOX_URL }}
          DIGG_WALLET_ECOSYSTEM_VERIFIER_FRONTEND_BASE_URI: https://${{ secrets.SANDBOX_URL }}/demo-verifier
          DIGG_WALLET_ECOSYSTEM_VERIFIER_BACKEND_BASE_URI: https://${{ secrets.SANDBOX_URL }}/verifier
          DIGG_WALLET_ECOSYSTEM_WALLET_CLIENT_GATEWAY_BASE_URI: https://${{ secrets.SANDBOX_URL }}/api
          DIGG_WALLET_ECOSYSTEM_WALLET_CLIENT_GATEWAY_API_KEY: ${{ secrets.CLIENT_GATEWAY_API_KEY }}
          DIGG_WALLET_ECOSYSTEM_WALLET_PROVIDER_BASE_URI: https://${{ secrets.SANDBOX_URL }}/wallet-provider
          DIGG_WALLET_ECOSYSTEM_PID_ISSUER_BASE_URI: https://${{ secrets.SANDBOX_URL }}/pid-issuer
          DIGG_WALLET_ECOSYSTEM_KEYCLOAK_BASE_URI: https://${{ secrets.SANDBOX_URL }}/idp
          DIGG_WALLET_ECOSYSTEM_SKIP_TESTS_USING_CUSTOM_HOSTS: true
          DIGG_WALLET_ECOSYSTEM_SKIP_TESTS_FOR_KEYCLOAK_HEALTH: true
          DIGG_WALLET_ECOSYSTEM_SKIP_TESTS_FOR_VERIFIER_BACKEND_HEALTH: true
        run: |
          echo "Running tests on sandbox..."
          # shellcheck disable=SC2086
          mvn $MAVEN_CLI_OPTS test
