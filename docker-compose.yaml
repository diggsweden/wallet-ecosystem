name: wallet-ecosystem-local

networks:
  wallet-ecosystem-network:
    name: wallet-ecosystem-network
volumes:
  softhsm-tokens:
    name: softhsm-tokens
    driver: local

x-kafka-common: &kafka-common
  image: apache/kafka-native:latest@sha256:777f2dddec6970003f1f27922a8c317d87140567b0537e801d35669ad9a81faf
  environment: &kafka-env
    KAFKA_CLUSTER_ID: NjM0OUVDRTItMTg2Ni00QU
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    KAFKA_MIN_INSYNC_REPLICAS: 1
    KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

services:
  refimpl-verifier-backend:
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-verifier-endpoint:v0.9.2
    container_name: refimpl-verifier-backend
    hostname: refimpl-verifier-backend
    volumes:
      - ./config/certificates/verifier/verifier_backend.p12:/opt/common/verifier_backend.p12:ro
    environment:
      SPRING_WEBFLUX_BASEPATH: "/refimpl-verifier-backend"
      VERIFIER_PUBLICURL: "${BASE_URL}/refimpl-verifier-backend"
      VERIFIER_ORIGINALCLIENTID: "${VERIFIER_CLIENT_ID:-localhost}"
      VERIFIER_CLIENTIDPREFIX: "x509_san_dns"
      SPRING_PROFILES_ACTIVE: "self-signed"
      VERIFIER_ACCESS_CERTIFICATE_SIGNING_ALGORITHM: "ES256"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE: "file:///opt/common/verifier_backend.p12"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_TYPE: "PKCS12"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_PASSWORD: "pass1234"
      VERIFIER_ACCESS_CERTIFICATE_ALIAS: "verifier_backend"
      VERIFIER_ACCESS_CERTIFICATE_PASSWORD: "pass1234"
      VERIFIER_RESPONSE_MODE: "DirectPost"
      VERIFIER_ATTESTATIONCLASSIFICATIONS_PID_VCTS: "urn:eudi:pid:1"
      VERIFIER_TRUSTVALIDATOR_SERVICEURL: "http://trust-validator:8080/trust"
      LOGGING_LEVEL_EU_EUROPA_EC_EUDI_VERIFIER_ENDPOINT: "DEBUG"
      JAVA_OPTS: "-XX:MaxDirectMemorySize=128M"
    depends_on:
      - trust-validator
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.refimpl-verifier-backend.rule=PathPrefix(`/refimpl-verifier-backend`)"
      - "traefik.http.routers.refimpl-verifier-backend.entrypoints=websecure"
      - "traefik.http.routers.refimpl-verifier-backend.tls=true"
      - "traefik.http.routers.refimpl-verifier-backend.service=refimpl-verifier-backend"
      - "traefik.http.services.refimpl-verifier-backend.loadbalancer.server.port=8080"
    networks:
      - wallet-ecosystem-network

  trust-validator:
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-trust-validator:edge
    container_name: trust-validator
    hostname: trust-validator
    volumes:
      - ./config/certificates/trust-validator/trusted_issuers.p12:/opt/common/trusted_issuers.p12:ro
    environment:
      LOGGING_LEVEL_EU_EUROPA_EC_EUDI: "TRACE"
      TRUST_VALIDATOR_DSS_CACHE_LOCATION: "/tmp/dss-cache"
      TRUST_VALIDATOR_LOTE_CACHE_LOCATION: "/tmp/lote-cache"
      TRUST_VALIDATOR_TRUST_SOURCES_KEY_STORE_LOCATION: "file:///opt/common/trusted_issuers.p12"
      TRUST_VALIDATOR_TRUST_SOURCES_KEY_STORE_KEY_STORE_TYPE: "PKCS12"
      TRUST_VALIDATOR_TRUST_SOURCES_KEY_STORE_PASSWORD: "pass1234"
      # Dummy LoTL configuration required by v0.2.x to enable the VerificationContexts
      TRUST_VALIDATOR_TRUST_SOURCES_PID_PROVIDERS_LOTL_LOCATION: "http://localhost/dummy.xml"
      TRUST_VALIDATOR_TRUST_SOURCES_PID_PROVIDERS_LOTL_ISSUANCE_SERVICE: "http://uri.etsi.org/19602/SvcType/PID/Issuance"
      TRUST_VALIDATOR_TRUST_SOURCES_PID_PROVIDERS_LOTL_REVOCATION_SERVICE: "http://uri.etsi.org/19602/SvcType/PID/Revocation"
      # Also enable Wallet Providers for E2E tests
      TRUST_VALIDATOR_TRUST_SOURCES_WALLET_PROVIDERS_LOTL_LOCATION: "http://localhost/dummy.xml"
      TRUST_VALIDATOR_TRUST_SOURCES_WALLET_PROVIDERS_LOTL_ISSUANCE_SERVICE: "http://uri.etsi.org/19602/SvcType/PID/Issuance"
      TRUST_VALIDATOR_TRUST_SOURCES_WALLET_PROVIDERS_LOTL_REVOCATION_SERVICE: "http://uri.etsi.org/19602/SvcType/PID/Revocation"
    networks:
      - wallet-ecosystem-network

  wallet-provider:
    image: ghcr.io/diggsweden/wallet-provider:v0.0.20@sha256:de143495df747441b24b478b7b853507ae3c603134319321ef52be96e0f59c9b
    container_name: wallet-provider
    hostname: wallet-provider
    volumes:
      - ./config/certificates/wallet-provider/wallet_provider.p12:/opt/common/wallet_provider.p12
    environment:
      SERVER_SERVLET_CONTEXT_PATH: "/wallet-provider"
      SPRING_PROFILES_ACTIVE: "prod"
      TZ: "Europe/Stockholm"
      JAVA_OPTS: "-Djava.net.preferIPv4Stack=true"
      WUA_KEYSTORE_PATH: "file:///opt/common/wallet_provider.p12"
      WUA_KEYSTORE_PASSWORD: "pass1234"
      WUA_KEYSTORE_ALIAS: "wallet_provider"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallet-provider.rule=PathPrefix(`/wallet-provider`)"
      - "traefik.http.routers.wallet-provider.entrypoints=websecure"
      - "traefik.http.routers.wallet-provider.tls=true"
      - "traefik.http.routers.wallet-provider.service=wallet-provider"
      - "traefik.http.services.wallet-provider.loadbalancer.server.port=8080"
    networks:
      - wallet-ecosystem-network

  demo-verifier:
    image: ghcr.io/diggsweden/wallet-verifier-test-web:0.1.5
    container_name: demo-verifier
    hostname: demo-verifier
    environment:
      HOST_API: "http://refimpl-verifier-backend:8080/refimpl-verifier-backend"
      PORT: "3002"
      NITRO_PORT: "3002"
      NUXT_PUBLIC_BASE_URL: "${BASE_URL}/demo-verifier"
      NUXT_APP_BASE_URL: "/demo-verifier"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    depends_on:
      - refimpl-verifier-backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.demo-verifier.rule=PathPrefix(`/demo-verifier`)"
      - "traefik.http.routers.demo-verifier.entrypoints=websecure"
      - "traefik.http.routers.demo-verifier.tls=true"
      - "traefik.http.services.demo-verifier.loadbalancer.server.port=3002"
    restart: on-failure
    networks:
      - wallet-ecosystem-network

  pid-issuer:
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-pid-issuer:v0.9.1
    container_name: pid-issuer
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=insecure
      - SPRING_WEBFLUX_BASE_PATH=/pid-issuer
      - SERVER_PORT=8080
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_OPAQUETOKEN_CLIENT_ID=pid-issuer-srv
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_OPAQUETOKEN_CLIENT_SECRET=zIKAV9DIIIaJCzHCVBPlySgU8KgY68U2
      - SERVER_FORWARD_HEADERS_STRATEGY=FRAMEWORK
      - ISSUER_PUBLICURL=${BASE_URL}/pid-issuer
      - ISSUER_AUTHORIZATIONSERVER_PUBLICURL=${BASE_URL}/idp/realms/pid-issuer-realm
      - ISSUER_AUTHORIZATIONSERVER_METADATA=http://keycloak:8080/idp/realms/pid-issuer-realm/.well-known/openid-configuration
      - ISSUER_AUTHORIZATIONSERVER_INTROSPECTION=http://keycloak:8080/idp/realms/pid-issuer-realm/protocol/openid-connect/token/introspect
      - ISSUER_CREDENTIALRESPONSEENCRYPTION_SUPPORTED=true
      - ISSUER_CREDENTIALRESPONSEENCRYPTION_REQUIRED=true
      - ISSUER_CREDENTIALRESPONSEENCRYPTION_ALGORITHMSSUPPORTED=ECDH-ES
      - ISSUER_CREDENTIALRESPONSEENCRYPTION_ENCRYPTIONMETHODS=A128GCM
      - ISSUER_PID_MSO_MDOC_ENABLED=false
      - ISSUER_PID_SD_JWT_VC_ENABLED=true
      - ISSUER_PID_SD_JWT_VC_NOTUSEBEFORE=PT0S
      - ISSUER_PID_SD_JWT_VC_NOTIFICATIONS_ENABLED=true
      - ISSUER_PID_SD_JWT_VC_KEY_ATTESTATIONS_REQUIRED=true
      - ISSUER_PID_SD_JWT_VC_KEY_ATTESTATIONS_CONSTRAINTS_KEY_STORAGE=iso_18045_high
      - ISSUER_PID_SD_JWT_VC_KEY_ATTESTATIONS_CONSTRAINTS_USER_AUTHENTICATION=iso_18045_high
      - ISSUER_PID_ISSUINGCOUNTRY=SE
      - ISSUER_PID_ISSUINGJURISDICTION=SE-Y # Västernorrland
      - ISSUER_EHIC_ENABLED=false
      - ISSUER_MDL_ENABLED=false
      - ISSUER_LEARNINGCREDENTIAL_ENABLED=false
      - ISSUER_CREDENTIALOFFER_URI=openid-credential-offer://
      - ISSUER_KEYSTORE_FILE=file:///opt/common/pid_issuer.p12
      - ISSUER_KEYSTORE_TYPE=PKCS12
      - ISSUER_KEYSTORE_PASSWORD=pass1234
      - ISSUER_PID_SD_JWT_VC_SIGNING_KEY=LoadFromKeystore
      - ISSUER_PID_SD_JWT_VC_SIGNING_KEY_ALIAS=pid_issuer
      - ISSUER_PID_SD_JWT_VC_SIGNING_KEY_PASSWORD=pass1234
      - ISSUER_METADATA_SIGNED_METADATA_ENABLED=false
      - ISSUER_KEYCLOAK_SERVER_URL=http://keycloak:8080/idp
      - ISSUER_KEYCLOAK_AUTHENTICATION_REALM=master
      - ISSUER_KEYCLOAK_CLIENT_ID=admin-cli
      - ISSUER_KEYCLOAK_USERNAME=admin
      - ISSUER_KEYCLOAK_PASSWORD=password
      - ISSUER_KEYCLOAK_USER_REALM=pid-issuer-realm
      - ISSUER_DPOP_PROOF_MAX_AGE=PT1M
      - ISSUER_DPOP_CACHE_PURGE_INTERVAL=PT10M
      - ISSUER_DPOP_REALM=pid-issuer
      - ISSUER_DPOP_NONCE_ENABLED=false
      - ISSUER_CREDENTIALENDPOINT_BATCHISSUANCE_ENABLED=true
      - ISSUER_CREDENTIALENDPOINT_BATCHISSUANCE_BATCHSIZE=10
      - ISSUER_CNONCE_EXPIRATION=PT5M
      - ISSUER_ACCESS_TOKEN_TYPE=BearerAndDPoPIfAvailable
      - ISSUER_METADATA_DISPLAY_0_LOGO_URI=https://dela.digg.se/img/sr-logo-color.png
      - ISSUER_METADATA_DISPLAY_0_NAME=DIGG issuer
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,loggers,httpexchanges
      - SPRING_CODEC_LOG_REQUEST_DETAILS=true
      - LOGGING_LEVEL_EU_EUROPA_EC_EUDI=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_REACTIVE=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_HTTP_SERVER_REACTIVE=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_HTTP_CODEC=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_REACTIVE_FUNCTION_CLIENT_EXCHANGEFUNCTIONS=DEBUG
      - JAVA_OPTS="-XX:MaxDirectMemorySize=128M"
    volumes:
      - ./config/certificates/issuer/pid_issuer.p12:/opt/common/pid_issuer.p12:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pid-issuer.rule=PathPrefix(`/pid-issuer`)"
      - "traefik.http.routers.pid-issuer.entrypoints=websecure"
      - "traefik.http.routers.pid-issuer.tls=true"
      - "traefik.http.routers.pid-issuer.service=pid-issuer"
      - "traefik.http.routers.well-known-pid-issuer.rule=PathRegexp(`^/.well-known/([a-zA-Z-]+)/pid-issuer$`)"
      - "traefik.http.routers.well-known-pid-issuer.entrypoints=websecure"
      - "traefik.http.routers.well-known-pid-issuer.tls=true"
      - "traefik.http.routers.well-known-pid-issuer.service=pid-issuer"
      - "traefik.http.routers.well-known-pid-issuer.middlewares=well-known-pid-issuer-replace-path"
      - "traefik.http.middlewares.well-known-pid-issuer-replace-path.replacepathregex.regex=^/.well-known/([a-zA-Z-]+)/pid-issuer$"
      - "traefik.http.middlewares.well-known-pid-issuer-replace-path.replacepathregex.replacement=/pid-issuer/.well-known/$1"
      - "traefik.http.services.pid-issuer.loadbalancer.server.port=8080"
    networks:
      - wallet-ecosystem-network

  wallet-account-db:
    image: "postgres:16"
    container_name: wallet-account-db
    restart: always
    environment:
      POSTGRES_USER: wallet-account
      POSTGRES_PASSWORD: pass
      POSTGRES_DATABASE: wallet-account
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet-account -d wallet-account"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wallet-ecosystem-network

  wallet-account:
    image: ghcr.io/diggsweden/wallet-account:v0.1.4
    container_name: wallet-account
    hostname: wallet-account
    volumes:
      - ./config/common/Healthcheck.class:/opt/Healthcheck.class:ro
    environment:
      SERVER_SERVLET_CONTEXT_PATH: "/wallet-account"
      SPRING_PROFILES_ACTIVE: "prod"
      TZ: "Europe/Stockholm"
      JAVA_OPTS: "-Djava.net.preferIPv4Stack=true"
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://wallet-account-db:5432/wallet-account"
      SPRING_DATASOURCE_USERNAME: "wallet-account"
      SPRING_DATASOURCE_PASSWORD: "pass"
    ports:
      - "8083:8080"
    depends_on:
      wallet-account-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "--class-path", "/opt", "Healthcheck", "http://localhost:8080/wallet-account/actuator/health"]
      start_period: 5s
      interval: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallet-account.rule=PathPrefix(`/wallet-account`)"
      - "traefik.http.routers.wallet-account.entrypoints=websecure"
      - "traefik.http.routers.wallet-account.tls=true"
      - "traefik.http.routers.wallet-account.service=wallet-account"
      - "traefik.http.services.wallet-account.loadbalancer.server.port=8080"
    networks:
      - wallet-ecosystem-network

  wallet-client-gateway-valkey:
    image: "valkey/valkey:9.0.0-alpine"
    container_name: wallet-client-gateway-valkey
    restart: always
    healthcheck:
      test: ["CMD", "valkey-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6378:6379"
    networks:
      - wallet-ecosystem-network

  wallet-client-gateway:
    image: ghcr.io/diggsweden/wallet-client-gateway:v0.6.2
    container_name: wallet-client-gateway
    hostname: wallet-client-gateway
    volumes:
      - ./config/common/Healthcheck.class:/opt/Healthcheck.class:ro
    environment:
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: INFO
      SERVER_SERVLET_CONTEXT_PATH: "/wallet-client-gateway"
      SPRING_PROFILES_ACTIVE: "prod"
      TZ: "Europe/Stockholm"
      JAVA_OPTS: "-Djava.net.preferIPv4Stack=true"
      SERVER_PORT: "8080"
      PROPERTIES_APISECRET: "apikey"
      PROPERTIES_WALLETPROVIDER_BASEURL: "http://wallet-provider:8080/wallet-provider"
      PROPERTIES_WALLETACCOUNT_BASEURL: "http://wallet-account:8080/wallet-account"
      PROPERTIES_WALLETR2PS_BASEURL: "http://wallet-bff:8088"
      SPRING_DATA_REDIS_HOST: "wallet-client-gateway-valkey"
      SPRING_DATA_REDIS_PORT: "6379"
      SERVER_FORWARD_HEADERS_STRATEGY: "framework"
    ports:
      - "8082:8080"
    depends_on:
      wallet-bff:
        condition: service_started
      wallet-provider:
        condition: service_started
      wallet-account:
        condition: service_started
      wallet-client-gateway-valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "--class-path", "/opt", "Healthcheck", "http://localhost:8080/wallet-client-gateway/actuator/health"]
      start_period: 5s
      interval: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallet-client-gateway.rule=PathPrefix(`/wallet-client-gateway`)"
      - "traefik.http.routers.wallet-client-gateway.entrypoints=websecure"
      - "traefik.http.routers.wallet-client-gateway.tls=true"
      - "traefik.http.routers.wallet-client-gateway.service=wallet-client-gateway"
      - "traefik.http.services.wallet-client-gateway.loadbalancer.server.port=8080"
    networks:
      - wallet-ecosystem-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.4-0
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
      - --features=dpop,passkeys
    environment:
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/idp
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME=${BASE_URL}/idp
      - KC_HOSTNAME_ADMIN=${BASE_URL}/idp-internal
      - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=password
    healthcheck:
      test: "bash /opt/keycloak/health-check.sh"
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    volumes:
      - ./config/keycloak/extra/health-check.sh:/opt/keycloak/health-check.sh
      - ./config/keycloak/themes/:/opt/keycloak/themes
      - ./config/keycloak/realms/:/opt/keycloak/data/import/
    labels:
      - "traefik.enable=true"
      # Whitelist: pid-issuer-realm (all subpaths), shared resources, js, and well-known endpoints
      - "traefik.http.routers.keycloak.rule=PathPrefix(`/idp/realms/pid-issuer-realm`) || PathPrefix(`/idp/resources`) || PathPrefix(`/idp/js`) || Path(`/idp/.well-known/openid-configuration`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.routers.keycloak.service=keycloak"
      # Whitelist: health endpoints → management port 9000
      - "traefik.http.routers.keycloak-health.rule=PathPrefix(`/idp/health`)"
      - "traefik.http.routers.keycloak-health.entrypoints=websecure"
      - "traefik.http.routers.keycloak-health.tls=true"
      - "traefik.http.routers.keycloak-health.service=keycloak-health"
      # Keycloak services
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      - "traefik.http.services.keycloak-health.loadbalancer.server.port=9000"
      # OAuth server discovery endpoint
      - "traefik.http.routers.well-known-oauth-server.rule=PathPrefix(`/.well-known/oauth-authorization-server`)"
      - "traefik.http.routers.well-known-oauth-server.entrypoints=websecure"
      - "traefik.http.routers.well-known-oauth-server.tls=true"
      - "traefik.http.routers.well-known-oauth-server.service=keycloak"
      - "traefik.http.routers.well-known-oauth-server.middlewares=well-known-oauth-server-replace-path"
      - "traefik.http.middlewares.well-known-oauth-server-replace-path.replacepathregex.regex=^/.well-known/([a-zA-Z-]+)/idp/realms/([a-zA-Z-]+)/?"
      - "traefik.http.middlewares.well-known-oauth-server-replace-path.replacepathregex.replacement=/idp/realms/$2/.well-known/$1"
      # Internal route: full access to all Keycloak paths including admin and master realm & master realm protocol endpoints (login, OIDC, 3P cookies)
      - "traefik.http.routers.keycloak-internal.rule=PathPrefix(`/idp-internal`)"
      - "traefik.http.routers.keycloak-internal.entrypoints=websecure"
      - "traefik.http.routers.keycloak-internal.tls=true"
      - "traefik.http.routers.keycloak-internal.service=keycloak"
      - "traefik.http.routers.keycloak-internal.middlewares=keycloak-internal-rewrite"
      # middleware
      - "traefik.http.middlewares.keycloak-internal-rewrite.replacepathregex.regex=^/idp-internal(.*)"
      - "traefik.http.middlewares.keycloak-internal-rewrite.replacepathregex.replacement=/idp$$1"
      - "traefik.http.middlewares.keycloak-block-403.plugin.fail.statusCode=403"
      # Blacklist: idp/admin/master/console because traefik dont hv authpolicy
      - "traefik.http.routers.keycloak-block.priority=20"
      - "traefik.http.routers.keycloak-block.rule=PathPrefix(`idp/admin/master/console`)"
      - "traefik.http.routers.keycloak-block.entrypoints=websecure"
      - "traefik.http.routers.keycloak-block.tls=true"
      - "traefik.http.routers.keycloak-block.service=noop@internal"
      - "traefik.http.middlewares.keycloak-block-admin=block-403"

    networks:
      - wallet-ecosystem-network

  wallet-bff:
    image: ghcr.io/diggsweden/wallet-r2ps/wallet-bff:0.0.0-dev-main-f014639
    ports:
      - "8088:8088"
      - "9012:8000"
    restart: on-failure
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      kafka-1:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092"
      KAFKA_BROKER_ADDRESS_FAMILY: "v4"
      KAFKA_GROUP_ID: "r2ps-rest-api-group"
      REDIS_HOST: "wallet-client-gateway-valkey"
      REDIS_PORT: 6379
      REDIS_USERNAME: "default"
      REDIS_PASSWORD: "secret"
      REDIS_DATABASE: 0
      SERVER_PORT: 8088
      SERVE_SYNC: "true"
      SYNC_TIMEOUT_MS: 3000
      RESPONSE_TTL_SECONDS: 600
      HSM_WORKER_RESPONSE_TOPIC: "hsm-worker-responses-bff-1"
      STATE_INIT_RESPONSE_TOPIC: "state-init-responses-bff-1"
      RUST_LOG: "wallet_bff=info,rdkafka=warn,redis=warn"
      TZ: "Europe/Stockholm"
    networks:
      - wallet-ecosystem-network

  hsm-worker:
    image: ghcr.io/diggsweden/wallet-r2ps/hsm-worker:0.0.0-dev-main-f014639
    env_file:
      - .env.opaque
      - .env.softhsm
    environment:
      RUST_LOG: info
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092"
    volumes:
      - softhsm-tokens:/myuser/softhsm/tokens:rw
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    networks:
      - wallet-ecosystem-network

  kafka-1:
    !!merge <<: *kafka-common
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      !!merge <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:19092,EXTERNAL://localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 19092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - wallet-ecosystem-network

  init-kafka:
    image: apache/kafka:latest@sha256:9516fb7634bad307d17c33b589fde9023003b0cb761374f500002b980a3149b9
    depends_on:
      kafka-1:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-e", "/tmp/init-kafka-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092"
      WALLET_STATE_TOPIC: "wallet-state"
      REQUEST_TOPICS: "hsm-requests,state-init-requests"
      RESPONSE_TOPICS: "hsm-worker-responses-bff-1,state-init-responses-bff-1,hsm-worker-responses-bff-2,state-init-responses-bff-2"
      REQUEST_TOPIC_PARTITIONS: 10
      WALLET_STATE_REPLICATION_FACTOR: 1
      WALLET_STATE_MIN_INSYNC_REPLICAS: 1
      TRANSIENT_REPLICATION_FACTOR: 1
      TRANSIENT_MIN_INSYNC_REPLICAS: 1
    volumes:
      - ./config/init-kafka-topics.sh:/tmp/init-kafka-topics.sh
    networks:
      - wallet-ecosystem-network

  # Optional: Kafka UI for management
  kafka-ui:
    image: provectuslabs/kafka-ui:latest@sha256:8f2ff02d64b0a7a2b71b6b3b3148b85f66d00ec20ad40c30bdcd415d46d31818
    depends_on:
      kafka-1:
        condition: service_healthy
    ports:
      - "8084:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wallet-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:19092
    networks:
      - wallet-ecosystem-network

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
      - "8080:8080"
    volumes:
      - ${PODMAN_SOCK:-$XDG_RUNTIME_DIR/podman/podman.sock}:/var/run/docker.sock:ro
      - ./config/traefik:/etc/traefik
    command:
      - "--ping"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
      - "--serverstransport.insecureskipverify=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    labels:
      - "traefik.enable=true"
    networks:
      wallet-ecosystem-network:
