apiVersion: v1
kind: Service
metadata:
  name: wallet-account
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: wallet-account
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  selector:
    app.kubernetes.io/name: wallet-account
    app.kubernetes.io/part-of: wallet-ecosystem
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-account
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: wallet-account
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-account
      app.kubernetes.io/part-of: wallet-ecosystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-account
        app.kubernetes.io/part-of: wallet-ecosystem
      annotations:
        instrumentation.opentelemetry.io/inject-java: "true"
    spec:
      containers:
        - name: wallet-account
          image: ghcr.io/diggsweden/wallet-account:v0.1.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: /wallet-account
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: TZ
              value: Europe/Stockholm
            - name: JAVA_OPTS
              value: -Djava.net.preferIPv4Stack=true
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://wallet-account-db:5432/wallet-account
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wallet-account-db
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallet-account-db
                  key: password
          readinessProbe:
            httpGet:
              path: /wallet-account/actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /wallet-account/actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
