apiVersion: v1
kind: Service
metadata:
  name: wallet-client-gateway-valkey
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: wallet-client-gateway-valkey
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  selector:
    app.kubernetes.io/name: wallet-client-gateway-valkey
    app.kubernetes.io/part-of: wallet-ecosystem
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-client-gateway-valkey
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: wallet-client-gateway-valkey
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-client-gateway-valkey
      app.kubernetes.io/part-of: wallet-ecosystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-client-gateway-valkey
        app.kubernetes.io/part-of: wallet-ecosystem
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:9.0.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - --raw
                - incr
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
