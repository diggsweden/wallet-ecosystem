apiVersion: apps/v1
kind: Deployment
metadata:
  name: hsm-worker
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: hsm-worker
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hsm-worker
      app.kubernetes.io/part-of: wallet-ecosystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hsm-worker
        app.kubernetes.io/part-of: wallet-ecosystem
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka-1 19092; do sleep 5; done
        - name: wait-for-topics
          image: apache/kafka:latest@sha256:9516fb7634bad307d17c33b589fde9023003b0cb761374f500002b980a3149b9
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:19092 --list \
                | grep -qx 'wallet-state'; do
                sleep 5
              done
      containers:
        - name: hsm-worker
          image: ghcr.io/diggsweden/wallet-r2ps/hsm-worker:0.0.0-dev-feat-fix-latency-issue-67afdc8
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: info
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-1:19092
          envFrom:
            - secretRef:
                name: hsm-worker-env
          volumeMounts:
            - name: softhsm-tokens
              mountPath: /myuser/softhsm/tokens
      volumes:
        - name: softhsm-tokens
          hostPath:
            path: /home/digg/development/github.com/wallet-ecosystem/development/k3s/state/softhsm-tokens
            type: DirectoryOrCreate
