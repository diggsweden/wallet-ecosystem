apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  selector:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: wallet-ecosystem
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: health
      port: 9000
      targetPort: health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/part-of: wallet-ecosystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/part-of: wallet-ecosystem
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.3.4-0
          imagePullPolicy: IfNotPresent
          args:
            - start-dev
            - --features=dpop,passkeys
          ports:
            - name: http
              containerPort: 8080
            - name: health
              containerPort: 9000
          env:
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HTTP_RELATIVE_PATH
              value: /idp
            - name: KC_HOSTNAME
              value: http://localhost:28080/idp
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "false"
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: password
          readinessProbe:
            httpGet:
              path: /idp/health/ready
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /idp/health/live
              port: health
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-init
  namespace: wallet-ecosystem-local
  labels:
    app.kubernetes.io/name: keycloak-init
    app.kubernetes.io/part-of: wallet-ecosystem
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-init
        app.kubernetes.io/part-of: wallet-ecosystem
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-keycloak
          image: busybox:1.36
          env:
            - name: KEYCLOAK_HEALTH_URL
              value: http://$(KEYCLOAK_SERVICE_HOST):$(KEYCLOAK_SERVICE_PORT_HEALTH)/idp/health/ready
          command:
            - sh
            - -c
            - until wget -qO- "${KEYCLOAK_HEALTH_URL}"; do sleep 5; done
      containers:
        - name: keycloak-config-cli
          image: quay.io/adorsys/keycloak-config-cli@sha256:2d2a0663cf324379d9ffab896db8d00293cd0326151968b319cf166f6eec8fca
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: http://$(KEYCLOAK_SERVICE_HOST):$(KEYCLOAK_SERVICE_PORT_HTTP)/idp
            - name: KEYCLOAK_USER
              value: admin
            - name: KEYCLOAK_PASSWORD
              value: password
            - name: IMPORT_FILES_LOCATIONS
              value: /config/*.json
          volumeMounts:
            - name: keycloak-realm-import
              mountPath: /config
              readOnly: true
      volumes:
        - name: keycloak-realm-import
          hostPath:
            path: /home/digg/development/github.com/wallet-ecosystem/config/keycloak/realms
            type: Directory
